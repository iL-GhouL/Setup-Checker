name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, Win32]

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build x64
      if: matrix.platform == 'x64'
      run: msbuild "CL Setup.sln" /p:Configuration=Release /p:Platform=x64

    - name: Build x86
      if: matrix.platform == 'Win32'
      run: msbuild "CL Setup.sln" /p:Configuration=Release /p:Platform=Win32

    - name: Upload x64
      if: matrix.platform == 'x64'
      uses: actions/upload-artifact@v4
      with:
        name: CL-Setup-x64
        path: Build\x64\CL Setup.exe

    - name: Upload x86
      if: matrix.platform == 'Win32'
      uses: actions/upload-artifact@v4
      with:
        name: CL-Setup-x86
        path: Build\x86\CL Setup.exe
