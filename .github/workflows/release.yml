name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build x64 release
        shell: pwsh
        run: |
          msbuild "CL Setup.sln" /m /p:Configuration=Release /p:Platform=x64 /flp:logfile=msbuild.log;verbosity=normal
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content msbuild.log -Tail 80) -join "`n"
            $message = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=MSBuild failed::$message"
            exit $LASTEXITCODE
          }

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "Build\x64\CL Setup.exe" "dist\Setup-Checker.exe" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Setup-Checker.exe
          generate_release_notes: true
