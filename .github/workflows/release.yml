name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build x64 release
        run: msbuild "CL Setup.sln" /m /p:Configuration=Release /p:Platform=x64

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "Build\x64\CL Setup.exe" "dist\Setup-Checker.exe" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Setup-Checker.exe
          generate_release_notes: true
